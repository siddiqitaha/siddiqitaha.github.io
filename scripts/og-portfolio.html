<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:1200px;height:630px}
body{font-family:'IBM Plex Sans',sans-serif;background:#fff;color:#0f172a;position:relative;overflow:hidden}
.glow{position:absolute;width:900px;height:900px;left:50%;top:-440px;transform:translateX(-50%);background:radial-gradient(circle at center,rgba(124,58,237,.13),rgba(14,165,233,.07) 45%,transparent 70%)}
.wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 200px}
.pic{width:108px;height:108px;border-radius:24px;object-fit:cover;border:1px solid #e2e8f0}
.kicker{margin-top:22px;font-family:'IBM Plex Mono',monospace;font-size:19px;letter-spacing:4px;color:#0284c7;text-transform:uppercase}
.title{margin-top:14px;font-size:74px;font-weight:700;letter-spacing:-2px;line-height:1}
.sub{margin-top:14px;font-size:36px;font-weight:600;background:linear-gradient(90deg,#7c3aed,#0284c7);-webkit-background-clip:text;background-clip:text;color:transparent}
.tags{margin-top:26px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.tag{border:1px solid #d3dbe6;border-radius:999px;padding:8px 18px;font-size:22px;color:#334155}
.url{margin-top:26px;font-family:'IBM Plex Mono',monospace;font-size:24px;color:#64748b}
</style></head><body>
<div class="glow"></div>
<div class="wrap">
  <img class="pic" src="../public/avatar.jpg">
  <div class="kicker">Portfolio</div>
  <div class="title">Taha Nasir Siddiqi</div>
  <div class="sub">Cloud &amp; Systems Engineer</div>
  <div class="tags"><span class="tag">Azure &amp; AWS</span><span class="tag">Kubernetes</span><span class="tag">Terraform</span><span class="tag">Linux</span></div>
  <div class="url">siddiqitaha.github.io</div>
</div>
</body></html>
